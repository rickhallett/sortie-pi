project: sortie-pi

roster:
  - name: claude-sonnet
    provider: anthropic
    model: claude-sonnet-4-20250514
    timeout: 120000
  - name: gemini-pro
    provider: google
    model: gemini-2.5-pro
    timeout: 120000
  - name: gpt
    provider: openai
    model: gpt-4.1
    timeout: 120000

debrief:
  model: claude-sonnet-4-20250514
  provider: anthropic
  prompt_template: prompts/debrief.md

triage:
  block_on: ["critical", "major"]
  convergence_threshold: 2
  max_remediation_cycles: 2

modes:
  code:
    prompt_template: prompts/sortie-code.md
  tests:
    prompt_template: prompts/sortie-tests.md
    roster: ["claude-sonnet", "gemini-pro"]
  docs:
    prompt_template: prompts/sortie-docs.md
    triage:
      block_on: ["critical"]

deposition_dir: .sortie
ledger_path: .sortie/ledger.yaml

sorties:
  orchestrator:
    definition: .pi/agents/orchestrator.md
    tools: [delegate, sortie-triage, sortie-ledger, sortie-identity]
    can_delegate_to: [validation-lead]
  validation-lead:
    definition: .pi/agents/validation-lead.md
    role: lead
    tools: [delegate, sortie-triage, sortie-ledger, sortie-identity, read, grep, find, ls]
    can_delegate_to: [reviewer-claude, reviewer-gemini, reviewer-codex]
    write_scope: ".sortie/**"
  reviewer-claude:
    definition: .pi/agents/reviewer-claude.md
    role: worker
    tools: [read, write, edit, grep, find, ls]
    can_delegate_to: []
  reviewer-gemini:
    definition: .pi/agents/reviewer-gemini.md
    role: worker
    tools: [read, write, edit, grep, find, ls]
    can_delegate_to: []
  reviewer-codex:
    definition: .pi/agents/reviewer-codex.md
    role: worker
    tools: [read, write, edit, grep, find, ls]
    can_delegate_to: []
